name: AWS SSM Fetch
description: Assume the per-repo OIDC role and fetch SSM SecureString params into masked env vars.
inputs:
  role-arn:
    description: "AWS IAM role ARN to assume (typically vars.AWS_ROLE_ARN)."
    required: true
  aws-region:
    description: "AWS region (typically vars.AWS_REGION)."
    required: true
  params:
    description: |
      Newline-separated SSM-path→env-var mapping. Each line: `<ssm-path><whitespace><ENV_VAR>`.
      Example:
        /providers/messaging/slack/main/bot-token   SLACK_BOT_TOKEN
        /providers/messaging/slack/main/channel-id  SLACK_CHANNEL_ID
    required: true
runs:
  using: composite
  steps:
    - name: Assume AWS role via OIDC
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-arn }}
        aws-region: ${{ inputs.aws-region }}
    - name: Fetch SSM parameters
      shell: bash
      env:
        PARAMS: ${{ inputs.params }}
      run: |
        set -euo pipefail
        # Process one parameter per aws call. Avoids the tab-separated --output text
        # parsing bug where multi-line values (PEMs) break line-based read loops.
        while IFS= read -r line; do
          [[ -z "${line// /}" ]] && continue
          path="${line%%[[:space:]]*}"
          var="${line##*[[:space:]]}"
          value=$(aws ssm get-parameter --with-decryption --name "$path" --query 'Parameter.Value' --output text)
          # Mask each line of the value so multi-line PEMs don't leak.
          while IFS= read -r vline; do
            [[ -z "$vline" ]] || echo "::add-mask::$vline"
          done <<< "$value"
          # Emit to GITHUB_ENV via heredoc form so multi-line values survive.
          delim="ghadelim_$RANDOM$RANDOM"
          {
            echo "$var<<$delim"
            echo "$value"
            echo "$delim"
          } >> "$GITHUB_ENV"
        done <<< "$PARAMS"
